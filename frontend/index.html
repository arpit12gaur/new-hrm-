
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HRMS Lite</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-bold mb-6">HRMS Lite</h1>

<div id="loading" class="text-gray-500 mb-4 hidden">Loading...</div>
<div id="empty" class="text-gray-500 mb-4 hidden">No employees found.</div>

<div class="bg-white p-6 rounded shadow mb-6">

<h2 class="text-xl mb-4">Add Employee</h2>

<input id="eid" class="border p-2 mr-2" placeholder="Employee ID">
<input id="name" class="border p-2 mr-2" placeholder="Full Name">
<input id="email" class="border p-2 mr-2" placeholder="Email">
<input id="dept" class="border p-2 mr-2" placeholder="Department">

<button onclick="addEmployee()" class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>

</div>

<div class="bg-white p-6 rounded shadow mb-6">

<h2 class="text-xl mb-4">Employee List</h2>

<table class="w-full border">
<thead>
<tr class="bg-gray-100">
<th class="p-2">ID</th>
<th class="p-2">Name</th>
<th class="p-2">Email</th>
<th class="p-2">Department</th>
<th class="p-2">Attendance</th>
<th class="p-2">Delete</th>
</tr>
</thead>

<tbody id="empBody"></tbody>

</table>

</div>

<div class="bg-white p-6 rounded shadow">

<h2 class="text-xl mb-4">Mark Attendance</h2>

<select id="empSelect" class="border p-2 mr-2"></select>
<input type="date" id="attDate" class="border p-2 mr-2">

<select id="attStatus" class="border p-2 mr-2">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>

<button onclick="markAttendance()" class="bg-green-500 text-white px-4 py-2 rounded">
Mark
</button>

</div>

</div>

<script>

const API="http://localhost:8000"

async function loadEmployees(){

loading.classList.remove("hidden")

let res=await fetch(API+"/employees")
let data=await res.json()

loading.classList.add("hidden")

empBody.innerHTML=""
empSelect.innerHTML=""

if(data.length==0){
empty.classList.remove("hidden")
}else{
empty.classList.add("hidden")
}

data.forEach(e=>{

empBody.innerHTML+=`
<tr>
<td class="p-2">${e.employee_id}</td>
<td class="p-2">${e.full_name}</td>
<td class="p-2">${e.email}</td>
<td class="p-2">${e.department}</td>
<td class="p-2">
<button onclick="viewAttendance(${e.id})" class="bg-gray-500 text-white px-2 py-1 rounded">View</button>
</td>
<td class="p-2">
<button onclick="del(${e.id})" class="bg-red-500 text-white px-2 py-1 rounded">Delete</button>
</td>
</tr>
`

empSelect.innerHTML += `
<option value="${e.id}">
${e.employee_id} - ${e.full_name}
</option>`

})

}

async function addEmployee(){

let data = {
employee_id: document.getElementById("eid").value,
full_name: document.getElementById("name").value,
email: document.getElementById("email").value,
department: document.getElementById("dept").value
}

await fetch(API + "/employees", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
})

loadEmployees()

}

async function del(id){

await fetch(API+"/employees/"+id,{method:"DELETE"})
loadEmployees()

}

async function markAttendance(){

let data={
employee_id:empSelect.value,
date:attDate.value,
status:attStatus.value
}

await fetch(API+"/attendance",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Attendance marked")

}

async function viewAttendance(id){

let res=await fetch(API+"/attendance/"+id)
let data=await res.json()

let text="Attendance Records:\n"

data.forEach(a=>{
text+=a.date+" - "+a.status+"\n"
})

alert(text)

}

loadEmployees()

</script>

</body>
</html>
